services:
  - type: web
    name: shl-recommender
    runtime: python
    region: oregon
    plan: free
    buildCommand: bash build.sh
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
